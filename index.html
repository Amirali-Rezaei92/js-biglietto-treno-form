<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./styls/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-light bg-opacity-75 fixed-top">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo01"
                aria-controls="navbarTogglerDemo01" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse " id="navbarTogglerDemo01">
                <a class="navbar-brand p-1" href="#"><img
                        src="./images/fast-train-llogo-design-high-speed-rail-icon-vector-illustration-fast-train-llogo-design-high-speed-rail-silhouette-icon-vector-291958535.webp"
                        alt="" class="img-brand"></a>
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="#" >Contact Us</a>
                    </li>
                </ul>
                <form class="d-flex gap-2" role="search">
                    <select name="" id="" class="form-control w-50">
                        <option value="">🇮🇹 It</option>
                        <option value="">🇬🇧 en</option>
                    </select>
                    <select name="" id="" class="form-control w-25">
                        <option value="€">€</option>
                        <option value="$">$</option>
                        <option value="£">£</option>
                    </select>
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                    <button class="btn btn-outline-danger" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="wallpaper text-center">
        <div class="card-base ">
            <form action="" class="d-flex flex-column gap-2 form">
                <div class="row">
                    <div class="col-12 col-md-3">
                        <input type="text" placeholder="Nome" id="name" class="w-100 rounded-2 border-1 form-control" required>
                    </div>
                    <div class="col-12 col-md-3">
                        <input type="text" placeholder="Cognome" id="cognome"
                            class="w-100 rounded-2 border-1 form-control" required>
                    </div>
                    <div class="col-12 col-md-1">
                        <select name="" id="age" class="w-100 rounded-2 border-1 form-control" required>
                            <option value="-">Età</option>
                        </select>
                    </div>
                    <div class="col-5 d-md-block d-none text-start">
                        <p class="font-size">Se hai meno di <span class="fw-bold ">18 anni</span>, ricevi uno sconto del <span
                                class="fw-bold">20%</span>, mentre se hai più di <span class="fw-bold">65 anni </span>,
                            ricevi uno sconto del <span class="fw-bold">40%</span> .</p>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12 col-md-3">
                        <select name="" id="origine" class="w-100 rounded-2 border-1 form-control"required>
                            <option value="-">Origine</option>
                            <option value="milano">Milano</option>
                            <option value="roma">Roma</option>
                            <option value="napoli">Napoli</option>
                            <option value="firenze">Firenze</option>
                            <option value="torino">Torino</option>
                            <option value="venezia">Venezia</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-3">
                        <select name="" id="destinazione" class="w-100 rounded-2 border-1 form-control" required>
                            <option value="-">Destinazione</option>
                            <option value="milano">Milano</option>
                            <option value="roma">Roma</option>
                            <option value="napoli">Napoli</option>
                            <option value="firenze">Firenze</option>
                            <option value="torino">Torino</option>
                            <option value="venezia">Venezia</option>
                        </select>

                    </div>
                    <div class="col-12 col-md-2"><input type="date" class="form-control col-12 col-md-4" required></div>
                    <div class="col-12 col-md-2"><input type="date" class="form-control col-12 col-md-4"  id="date-torna" disabled></div>
                    <div class="col-12 col-md-2 fw-bold mt-2"><input type="checkbox" id="check" > <span class="font-size">Andata e Ritorno</span></div>

                </div>

                <div>
                    <button id="btn" class="btn btn-warning border-black mt-3">Calcola Prezzo</button>
                </div>
            </form>
        </div>
    </div>


    <div class="container bg-black mt-3 rounded-3 mx-auto m-2 preventivo-box" id="ticket"> </div>
    <hr>
    <div class="container text-center mt-3">
        <div class="row ">
            <div class="col-2 align-content-center fw-bold"><p>Paga in sicuro con :</p></div>
            <div class="col-2"> <img src="./images/apple-pay.png" alt="" class="pagamenti-logo"></div>
            <div class="col-2"><img src="./images/card.png" alt="" class="pagamenti-logo"></div>
            <div class="col-2"><img src="./images/paypal.png" alt="" class="pagamenti-logo"></div>
            <div class="col-2"><img src="./images/symbols.png" alt="" class="pagamenti-logo"></div>
            <div class="col-2"><img src="./images/visa.png" alt="" class="pagamenti-logo"></div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./scripts/index.js"></script>

</html>
